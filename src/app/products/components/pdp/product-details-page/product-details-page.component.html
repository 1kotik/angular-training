<article class="pdp">
  <ng-container *ngIf="product$ | async as product else notFoundMessage" class="pdp__container">
    <product-details [product]="product" class="pdp__section" />
    <product-review-list [productId]="productId" class="pdp__section pdp__section--reviews" />
  </ng-container>
  <ng-template #notFoundMessage>
    <span class="pdp__not-found-message">Product not found</span>
  </ng-template>
</article>
